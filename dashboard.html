<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAT-Academy | Mi Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="dashboard-wrapper">
        <aside id="sidebar">
            <div class="user-profile">
                <img src="assets/images/avatar-default.png" alt="Avatar" id="user-avatar">
                <h3 id="user-display-name">Estudiante</h3>
                <div class="stats">
                    <p>Nivel: <span id="user-level">1</span></p>
                    <p>XP: <span id="user-xp">0</span></p>
                    <div class="progress-bar"><div id="xp-fill"></div></div>
                </div>
            </div>
            <nav>
                <button id="btn-logout">Cerrar Sesión</button>
            </nav>
        </aside>

        <main id="content-area">
            <h2>Módulos de Tecnología</h2>
            <div id="modules-grid">
                </div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
