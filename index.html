<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT-Academy | Bienvenida</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="login-container">
        <header>
            <h1>SAT-ACADEMY</h1>
            <p>Sistema de Aprendizaje Tecnológico</p>
        </header>

        <section id="auth-form">
            <h2>Acceso Estudiantil</h2>
            <input type="email" id="email" placeholder="Correo institucional">
            <input type="password" id="password" placeholder="Contraseña">
            
            <div class="button-group">
                <button id="btn-login">Entrar</button>
                <button id="btn-register" class="secondary">Registrarse</button>
            </div>
        </section>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
